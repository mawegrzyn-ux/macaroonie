name: Deploy to Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy + PM2 restart
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SERVER_HOST }}
          username:    ${{ secrets.SERVER_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP=/home/ubuntu/app

            echo "── pulling latest code ──────────────────"
            # Hard-reset the working tree to origin/main.
            # Any hand-edits to tracked files on the server are discarded —
            # this repo is auto-deployed and origin/main is the source of
            # truth. Untracked files (.env, uploads/, node_modules/, etc)
            # are preserved. If you genuinely need to pin a local fix, commit
            # it to the repo so it survives.
            git -C $APP fetch --prune origin main
            git -C $APP reset --hard origin/main
            git -C $APP clean -fd --exclude=.env --exclude=node_modules --exclude=dist --exclude=uploads

            echo "── api: install production deps ─────────"
            cd $APP/api && npm install --production --silent

            echo "── database: run pending migrations ─────"
            # Idempotent — only applies SQL files not yet in schema_migrations.
            # Fails the deploy if any migration errors, before pm2 restart.
            #
            # AUTO_BASELINE_UP_TO=024 is a self-healing fallback: on a
            # server whose schema was built manually via psql before this
            # runner existed, the FIRST run detects the empty tracker
            # plus the pre-existing `tenants` table and marks 001–024 as
            # applied without re-running them. On every subsequent run
            # the tracker is non-empty so the auto-baseline is a no-op.
            # Safe to leave in place permanently; remove once the tracker
            # has ever been populated on all deployed servers.
            (
              cd $APP/api
              set -a; source .env; set +a
              AUTO_BASELINE_UP_TO=024 node scripts/migrate.js
            )

            echo "── admin: install + build ───────────────"
            cd $APP/admin && npm install --silent && npm run build
            chmod -R 755 $APP/admin/dist

            echo "── restart api ──────────────────────────"
            pm2 restart macaroonie-api && pm2 save

            echo "── health check ─────────────────────────"
            sleep 3
            curl -sf http://localhost:3000/api/health \
              && echo "✓ API healthy" \
              || (echo "✗ health check failed"; pm2 logs macaroonie-api --lines 30 --nostream; exit 1)
