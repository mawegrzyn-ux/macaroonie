name: Deploy to Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy + PM2 restart
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SERVER_HOST }}
          username:    ${{ secrets.SERVER_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP=/home/booking/app

            echo "── pulling latest code ──────────────────"
            sudo -u booking git -C $APP pull origin main
            sudo chown -R booking:booking $APP

            echo "── api: install production deps ─────────"
            sudo -u booking bash -c "cd $APP/api && npm install --production --silent"

            echo "── admin: install + build ───────────────"
            sudo -u booking bash -c "cd $APP/admin && npm install --silent && npm run build"

            echo "── restart api ──────────────────────────"
            sudo -u booking bash -c "pm2 restart macaroonie-api && pm2 save"

            echo "── health check ─────────────────────────"
            sleep 3
            curl -sf http://localhost:3000/api/health \
              && echo "✓ API healthy" \
              || (echo "✗ health check failed"; sudo -u booking pm2 logs macaroonie-api --lines 30 --nostream; exit 1)
