name: Deploy to Lightsail

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: SSH deploy + PM2 restart
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SERVER_HOST }}
          username:    ${{ secrets.SERVER_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP=/home/ubuntu/app

            echo "── pulling latest code ──────────────────"
            git -C $APP pull origin main

            echo "── api: install production deps ─────────"
            cd $APP/api && npm install --production --silent

            echo "── database: run pending migrations ─────"
            # Idempotent — only applies SQL files not yet in schema_migrations.
            # Fails the deploy if any migration errors, before pm2 restart.
            # One-off baseline for servers that already have the schema:
            #   cd $APP/api && set -a; source .env; set +a
            #   node scripts/migrate.js --baseline-up-to 024
            (
              cd $APP/api
              set -a; source .env; set +a
              node scripts/migrate.js
            )

            echo "── admin: install + build ───────────────"
            cd $APP/admin && npm install --silent && npm run build
            chmod -R 755 $APP/admin/dist

            echo "── restart api ──────────────────────────"
            pm2 restart macaroonie-api && pm2 save

            echo "── health check ─────────────────────────"
            sleep 3
            curl -sf http://localhost:3000/api/health \
              && echo "✓ API healthy" \
              || (echo "✗ health check failed"; pm2 logs macaroonie-api --lines 30 --nostream; exit 1)
